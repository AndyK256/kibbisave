<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KibbiSave — Group</title>
  <link rel="icon" href="/assets/kibbisave.jpg" type="image/jpeg">
  <link rel="stylesheet" href="css/kibbisave-site.css?v=gd-blend-3">
  <script>document.documentElement.classList.add('kb-group-detail-open');</script>
</head>
<body class="kb-group-detail-open">
<header class="site-header">
  <div class="site-header-inner">
    <div class="site-brand"><a href="kibbisave_home_final.html" class="site-logo">Kibbisave</a></div>
    <nav class="site-nav">
      <a href="kibbisave_home_final.html">Home</a>
      <a href="kibbisave_groups_v6.html" class="active">Groups</a>
      <a href="kibbisave_community_explore.html">Community</a>
      <a href="kibbisave_leaderboard_v5.html">Leaderboard</a>
      <a href="kibbisave_profile_screen.html">Profile</a>
      <div class="nav-auth-mobile" data-auth-link><a href="/login?tab=join" class="site-btn-join">JOIN NOW</a><a href="/login?tab=login" class="site-btn-login">LOGIN</a></div>
      <a href="kibbisave_deposit_v2.html" class="nav-deposit-mobile">+ Deposit</a>
    </nav>
    <div class="site-header-actions">
      <div class="site-auth-pair" data-auth-link><a href="/login?tab=join" class="site-btn-join">JOIN NOW</a><a href="/login?tab=login" class="site-btn-login">LOGIN</a></div>
      <a href="kibbisave_deposit_v2.html" class="site-btn-deposit">+ Deposit</a>
    </div>

</header>
<main class="site-main site-main--group-detail">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font-sans);}
.wrap{
  background:#00008b;
  height:100%;
  min-height:0;
  display:flex;
  justify-content:center;
  padding:0;
  margin:0;
}
.phone{
  width:100%;
  max-width:560px;
  height:100%;
  min-height:0;
  background:#fff;
  border:none;
  border-radius:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.gd-chrome{
  flex:0 0 auto;
  background:#00008b;
  z-index:40;
}
.hdr{background:#00008b;padding:10px 16px 14px;flex-shrink:0;}
.hdr-row{display:flex;align-items:center;gap:10px;}
.back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;color:#fff;flex-shrink:0;font-size:16px;}
.hdr-name{color:#fff;font-size:17px;font-weight:600;line-height:1.25;}
.hdr-sub{color:rgba(255,255,255,0.7);font-size:11px;margin-top:2px;}
.hdr-badge{margin-left:auto;font-size:9px;font-weight:700;background:rgba(255,215,0,0.2);color:#ffd700;border-radius:20px;padding:3px 9px;white-space:nowrap;}
.hstat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;}
.hstat{background:rgba(255,255,255,0.1);border-radius:10px;padding:8px 10px;}
.hstat-val{color:#fff;font-size:13px;font-weight:600;}
.hstat-lbl{color:rgba(255,255,255,0.6);font-size:9px;margin-top:2px;text-transform:uppercase;letter-spacing:0.05em;}
.hprog-wrap{margin-top:12px;background:rgba(255,255,255,0.18);border-radius:4px;height:6px;}
.hprog{background:#ffd700;height:6px;border-radius:4px;width:0%;}
.hprog-row{display:flex;justify-content:space-between;margin-top:5px;}
.hprog-lbl{font-size:10px;color:rgba(255,255,255,0.6);}

.gd-tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  margin:0;
  padding:0 8px;
  background:#00008b;
  border-bottom:none;
}
.gd-tab{
  appearance:none;border:none;background:transparent;
  padding:11px 4px 12px;font:inherit;font-size:13px;font-weight:600;
  color:rgba(255,255,255,0.55);cursor:pointer;position:relative;
}
.gd-tab.is-active{color:#fff;}
.gd-tab.is-active::after{
  content:"";position:absolute;left:14%;right:14%;bottom:0;
  height:2px;background:#ffd700;border-radius:2px 2px 0 0;
}

.body{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  background:#fff;
  padding:0;
}
.gd-error{display:none;background:#fdecea;color:#a32d2d;font-size:12px;border-radius:10px;padding:9px 12px;margin:10px 16px 0;}

.gd-panel{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  padding:0;
}
.gd-panel[hidden]{display:none !important;}

.sec-head{
  flex:0 0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:0;
  padding:10px 16px 6px;
  background:#fff;
  border-bottom:1px solid #eef0f8;
}
.sec-title{font-size:11px;font-weight:600;color:#7a85a0;letter-spacing:0.02em;}
.race{font-size:9px;color:#00008b;font-weight:600;}

.gd-scroll{
  flex:1 1 auto;
  min-height:0;
  overflow-x:hidden;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:8px 16px 28px;
}

.member{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #eef0f8;border-radius:12px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.member:hover{border-color:#c5cce0;box-shadow:0 2px 8px rgba(0,0,56,.06);}
.member:focus-visible{outline:2px solid #00008b;outline-offset:2px;}
.m-rank{width:24px;height:24px;border-radius:50%;background:#eef0f8;color:#374057;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.m-rank.r1{background:#fff3cd;color:#7a4f00;}
.m-rank.r2{background:#eff0f2;color:#4a5568;}
.m-rank.r3{background:#fbe9d9;color:#8a4b12;}
.m-av{width:30px;height:30px;border-radius:50%;background:#00008b;color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.m-av img{width:100%;height:100%;object-fit:cover;}
.m-info{flex:1;min-width:0;}
.m-name{font-size:12px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.m-sub{font-size:10px;color:#7a85a0;margin-top:1px;}
.m-prog-wrap{background:#eef0f8;border-radius:4px;height:4px;margin-top:5px;}
.m-prog{background:#00008b;height:4px;border-radius:4px;}
.m-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.m-amt{font-size:11px;font-weight:600;color:#00008b;}
.m-lead{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;}
.m-lead.ahead{background:#e6f4ea;color:#1a6e35;}
.m-lead.behind{background:#fdecea;color:#a32d2d;}
.gd-cta{width:100%;background:#00008b;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;font-family:inherit;}
.gd-cta.secondary{background:#eef0f8;color:#00008b;}
.gd-end-cta{text-align:center;margin:1.35rem auto 0.25rem;max-width:320px;padding:0 4px;}
.gd-end-cta[hidden]{display:none !important;}
.gd-end-cta-illus{width:min(200px,62%);height:auto;display:block;margin:0.15rem auto 0.35rem;}
.gd-end-cta-btn{display:inline-flex;align-items:center;justify-content:center;width:100%;max-width:240px;margin:0 auto;padding:12px 16px;border-radius:22px;background:#00008b;color:#fff;font-size:13px;font-weight:700;letter-spacing:0.04em;text-decoration:none;border:none;cursor:pointer;font-family:inherit;}
.gd-end-cta-btn:hover{filter:brightness(1.08);color:#fff;}
.gd-end-cta-note{margin:10px 0 0;font-size:10px;color:#9aa3b5;line-height:1.45;}
.msg-panel{border:1px solid #dde3f0;border-radius:12px;padding:12px;background:#fff;margin:12px 16px 16px;}
.msg-panel.locked{background:#f9fafd;border-style:dashed;text-align:center;font-size:11px;color:#7a85a0;}
.msg-title{font-size:12px;font-weight:600;color:#111;margin-bottom:8px;}
.msg-list{flex:1;max-height:none;overflow:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.msg-item{background:#f4f6fb;border-radius:10px;padding:8px 10px;}
.msg-who{font-size:10px;font-weight:600;color:#00008b;}
.msg-body{font-size:12px;color:#111;margin-top:2px;white-space:pre-wrap;word-break:break-word;}
.msg-when{font-size:9px;color:#7a85a0;margin-top:3px;}
.msg-form{display:flex;gap:6px;}
.msg-input{flex:1;border:1px solid #dde3f0;border-radius:10px;padding:9px 10px;font:inherit;font-size:12px;}
.msg-send{border:none;background:#00008b;color:#fff;border-radius:10px;padding:9px 12px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;}
.msg-send:disabled{opacity:0.6;cursor:default;}
.msg-empty{font-size:11px;color:#7a85a0;text-align:center;padding:8px 0;}
.empty{padding:16px;text-align:center;font-size:11px;color:#7a85a0;}
.skel{position:relative;overflow:hidden;background:#e8ecf5;border-radius:10px;height:52px;margin-bottom:8px;}
.skel::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,0.7),transparent);animation:sh 1.2s infinite;}
@keyframes sh{100%{transform:translateX(100%)}}
@media (min-width:900px){
  .phone{max-width:640px;border-left:1px solid rgba(255,255,255,0.08);border-right:1px solid rgba(255,255,255,0.08);}
}
</style>

<div class="wrap">
<div class="phone">
  <div class="gd-chrome">
    <div class="hdr">
      <div class="hdr-row">
        <button type="button" class="back" id="gd-back" aria-label="Back">←</button>
        <div style="min-width:0;flex:1">
          <div class="hdr-name" id="gd-name">Loading…</div>
          <div class="hdr-sub" id="gd-sub">—</div>
        </div>
        <span class="hdr-badge" id="gd-badge" hidden>OPEN</span>
      </div>
      <div class="hstat-row">
        <div class="hstat"><div class="hstat-val" id="gd-target">—</div><div class="hstat-lbl">Group goal</div></div>
        <div class="hstat"><div class="hstat-val" id="gd-start">—</div><div class="hstat-lbl">Start date</div></div>
        <div class="hstat"><div class="hstat-val" id="gd-end">—</div><div class="hstat-lbl">End date</div></div>
      </div>
      <div class="hprog-wrap"><div class="hprog" id="gd-prog"></div></div>

        <span class="hprog-lbl" id="gd-saved">UGX 0 saved</span>
        <span class="hprog-lbl" id="gd-pct">0%</span>

    <div class="gd-tabs" role="tablist" aria-label="Group sections">
      <button type="button" class="gd-tab is-active" role="tab" id="tab-standings" aria-selected="true" aria-controls="panel-standings" data-tab="standings">Member standings</button>
      <button type="button" class="gd-tab" role="tab" id="tab-messages" aria-selected="false" aria-controls="panel-messages" data-tab="messages">Messages</button>
    </div>
  </div>

  <div class="body">
    <div class="gd-error" id="gd-error" role="alert"></div>

    <div class="gd-panel" id="panel-standings" role="tabpanel" aria-labelledby="tab-standings">
      <div class="sec-head">
        <span class="sec-title">Race to the top</span>
        <span class="race">🏁</span>
      </div>
      <div class="gd-scroll" id="gd-standings-scroll">

          <div class="skel"></div><div class="skel"></div><div class="skel"></div>
        </div>
        <button class="gd-cta" id="gd-join" hidden>Join this group</button>

        <div class="gd-end-cta" id="gd-end-cta" hidden>
          <img class="gd-end-cta-illus" src="/assets/illustrations/png/07-make-first-deposit.png?v=1" alt="Make first deposit" width="200" height="200" decoding="async">
          <a class="gd-end-cta-btn" id="gd-end-cta-btn" href="#">+ Make deposit</a>
          <p class="gd-end-cta-note" id="gd-end-cta-note"></p>
        </div>
      </div>
    </div>

    <div class="gd-panel" id="panel-messages" role="tabpanel" aria-labelledby="tab-messages" hidden>
      <div class="gd-scroll">
        <div class="msg-panel locked" id="gd-msgs">💬 Group messages — join this group to unlock</div>
      </div>
    </div>
  </div>
</div>
</div>
</main>
<footer class="site-footer">KibbiSave — group savings for Uganda</footer>

<script src="js/kibbisave-site.js?v=gd-blend-3"></script>
<script>
(function () {
  document.documentElement.classList.add('kb-group-detail-open');
  document.body.classList.add('kb-group-detail-open');

  var params = new URLSearchParams(window.location.search);
  var groupId = params.get('id');
  var wantMessages = String(params.get('tab') || '').toLowerCase() === 'messages';
  var err = document.getElementById('gd-error');
  var messagesActivated = false;
  var canUseMessages = false;
  var creatorOverride = false;

  function showErr(m) { err.textContent = m || ''; err.style.display = m ? 'block' : 'none'; }
  function fmtUGX(n) { return 'UGX ' + (Number(n) || 0).toLocaleString('en-US'); }
  function fmtDate(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    return isNaN(d) ? '—' : d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function initials(name) {
    return String(name || '?').trim().split(/\s+/).map(function (w) { return w[0]; }).slice(0, 2).join('').toUpperCase();
  }

  /** Amount needed to take (or keep) #1 by total deposited */
  function amountToBecomeLead(members, userId) {
    if (!members || !members.length) return 0;
    var sorted = members.slice().sort(function (a, b) {
      return (Number(b.total_deposited) || 0) - (Number(a.total_deposited) || 0);
    });
    var leadAmt = Number(sorted[0].total_deposited) || 0;
    var me = null;
    for (var i = 0; i < members.length; i++) {
      if (String(members[i].user_id) === String(userId)) { me = members[i]; break; }
    }
    var myAmt = me ? (Number(me.total_deposited) || 0) : 0;
    if (me && String(sorted[0].user_id) === String(userId)) {
      var second = sorted[1] ? (Number(sorted[1].total_deposited) || 0) : 0;
      return Math.max(1, (second + 1) - myAmt);
    }
    return Math.max(1, (leadAmt + 1) - myAmt);
  }

  document.getElementById('gd-back').addEventListener('click', function () {
    if (window.history.length > 1) history.back();
    else window.location.href = 'kibbisave_groups_v6.html';
  });

  function setTab(name) {
    var isMsg = name === 'messages';
    document.querySelectorAll('.gd-tab').forEach(function (tab) {
      var on = tab.getAttribute('data-tab') === (isMsg ? 'messages' : 'standings');
      tab.classList.toggle('is-active', on);
      tab.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    document.getElementById('panel-standings').hidden = isMsg;
    document.getElementById('panel-messages').hidden = !isMsg;
    try {
      var url = new URL(window.location.href);
      if (isMsg) url.searchParams.set('tab', 'messages');
      else url.searchParams.delete('tab');
      history.replaceState(null, '', url.pathname + url.search + url.hash);
    } catch (e) {}
    if (isMsg && canUseMessages && !messagesActivated) {
      activateMessages(creatorOverride ? { creatorOverride: true } : {});
    }
  }

  document.querySelectorAll('.gd-tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      setTab(tab.getAttribute('data-tab'));
    });
  });

  if (!groupId) { showErr('No group selected.'); return; }

  var communityCreator = params.get('community_creator') || '';
  var groupFetchUrl = '/api/groups/' + groupId +
    (communityCreator ? ('?community_creator=' + encodeURIComponent(communityCreator)) : '');

  fetch(groupFetchUrl, { credentials: 'include' })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d.error) { showErr(d.error); document.getElementById('gd-members').innerHTML = ''; return; }
      var g = d.group;

      document.getElementById('gd-name').textContent = g.name || (g.period_months + ' month group');
      document.getElementById('gd-sub').textContent =
        (g.current_members || 0) + '/' + (g.max_members || 7) + ' members · ' + g.period_months + ' months';
      document.getElementById('gd-target').textContent = fmtUGX(g.target_amount);
      document.getElementById('gd-start').textContent = fmtDate(g.created_at || g.starts_at);
      document.getElementById('gd-end').textContent = fmtDate(g.closes_at);
      var pct = Math.max(0, Math.min(100, Number(g.target_pct) || 0));
      document.getElementById('gd-prog').style.width = pct + '%';
      document.getElementById('gd-saved').textContent = fmtUGX(g.total_saved) + ' saved';
      document.getElementById('gd-pct').textContent = pct + '%';

      var badge = document.getElementById('gd-badge');
      if (g.status === 'open') { badge.hidden = false; badge.textContent = 'OPEN'; }
      else if (g.status === 'active' || g.status === 'locked') { badge.hidden = false; badge.textContent = 'SAVING'; }

      var box = document.getElementById('gd-members');
      var members = d.members || [];
      if (!members.length) {
        box.innerHTML = '<div class="empty">No members yet — be the first to join and name this group.</div>';
      } else {
        box.innerHTML = members.map(function (m, i) {
          var rank = m.rank_in_group || (i + 1);
          var lead = Number(m.avg_lead) || 0;
          var mpct = Math.max(0, Math.min(100, Number(m.target_pct) || 0));
          var href = m.user_id
            ? 'kibbisave_home_final.html?user=' + encodeURIComponent(m.user_id)
            : '';
          return '<div class="member"' +
            (href ? ' role="link" tabindex="0" data-href="' + esc(href) + '"' : '') + '>' +
            '<div class="m-rank r' + rank + '">' + rank + '</div>' +
            '<div class="m-av">' + (m.avatar_url ? '<img src="' + esc(m.avatar_url) + '" alt="">' : esc(initials(m.display_name))) + '</div>' +
            '<div class="m-info">' +
              '<div class="m-name">' + esc(m.display_name || 'Member') + '</div>' +
              '<div class="m-sub">Goal ' + fmtUGX(m.goal_amount) + (m.saving_for ? ' · ' + esc(m.saving_for) : '') + '</div>' +
              '<div class="m-prog-wrap"><div class="m-prog" style="width:' + mpct + '%"></div></div>' +
            '</div>' +
            '<div class="m-right">' +
              '<div class="m-amt">' + fmtUGX(m.total_deposited) + '</div>' +
              '<span class="m-lead ' + (lead >= 0 ? 'ahead' : 'behind') + '">' +
                (lead > 0 ? '+' : '') + lead.toFixed(2) + '%</span>' +
            '</div>' +
          '</div>';
        }).join('');
        box.querySelectorAll('.member[data-href]').forEach(function (row) {
          function go() { window.location.href = row.getAttribute('data-href'); }
          row.addEventListener('click', go);
          row.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); }
          });
        });
      }

      var joinBtn = document.getElementById('gd-join');
      var depBtn = document.getElementById('gd-deposit');
      var endCta = document.getElementById('gd-end-cta');
      var endBtn = document.getElementById('gd-end-cta-btn');
      var endNote = document.getElementById('gd-end-cta-note');
      var canJoin = g.status === 'open' && (g.current_members || 0) < (g.max_members || 7);
      var joinHref = 'kibbisave_join_group.html?id=' + encodeURIComponent(groupId);

      joinBtn.hidden = true;
      depBtn.hidden = true;

      if (d.is_member) {
        canUseMessages = true;
        creatorOverride = false;

        var need = amountToBecomeLead(members, d.user_id);
        endCta.hidden = false;
        endBtn.textContent = '+ Make deposit';
        endBtn.href = 'kibbisave_deposit_v2.html?group=' + encodeURIComponent(groupId);
        endNote.textContent = 'You can deposit ' + fmtUGX(need) + ' in order to become the lead in your group';
      } else if (d.community_creator_access) {
        canUseMessages = true;
        creatorOverride = true;
        endCta.hidden = false;
        endBtn.textContent = 'Other groups';
        endBtn.href = 'kibbisave_leaderboard_v5.html';
        endNote.textContent = 'You can check the leader board for further inspiration';
      } else if (canJoin) {
        /* Guest / non-member: Join lives on the end PNG CTA only */
        endCta.hidden = false;
        endBtn.textContent = 'Join this group';
        endBtn.href = joinHref;
        endNote.textContent = 'You can join our group and save with us as we are here';
      } else {
        endCta.hidden = false;
        endBtn.textContent = 'Other groups';
        endBtn.href = 'kibbisave_leaderboard_v5.html';
        endNote.textContent = 'You can check the leader board for further inspiration';
      }

      if (wantMessages) setTab('messages');
      else setTab('standings');
    })
    .catch(function () {
      showErr('Could not reach the server. Refresh to retry.');
      document.getElementById('gd-members').innerHTML = '';
    });

  function fmtMsgTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d)) return '';
    return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  function renderMessages(list, box) {
    if (!list.length) {
      box.innerHTML = '<div class="msg-empty">No messages yet — say hello to your group.</div>';
      return;
    }
    box.innerHTML = list.map(function (m) {
      return '<div class="msg-item">' +
        '<div class="msg-who">' + esc(m.display_name || 'Member') + '</div>' +
        '<div class="msg-body">' + esc(m.body) + '</div>' +
        '<div class="msg-when">' + esc(fmtMsgTime(m.created_at)) + '</div></div>';
    }).join('');
    box.scrollTop = box.scrollHeight;
  }

  function activateMessages(opts) {
    opts = opts || {};
    messagesActivated = true;
    var panel = document.getElementById('gd-msgs');
    panel.classList.remove('locked');
    var title = opts.creatorOverride
      ? 'Group messages (community creator)'
      : 'Group messages';
    panel.innerHTML =
      '<div class="msg-title">' + title + '</div>' +
      '<div class="msg-list" id="gd-msg-list"><div class="msg-empty">Loading…</div></div>' +
      '<form class="msg-form" id="gd-msg-form">' +
        '<input class="msg-input" id="gd-msg-input" maxlength="500" placeholder="Write a message…" autocomplete="off">' +
        '<button class="msg-send" type="submit">Send</button>' +
      '</form>';

    var listEl = document.getElementById('gd-msg-list');
    var form = document.getElementById('gd-msg-form');
    var input = document.getElementById('gd-msg-input');
    var messages = [];
    var msgQs = communityCreator
      ? ('?community_creator=' + encodeURIComponent(communityCreator))
      : '';

    function loadMsgs() {
      return fetch('/api/groups/' + groupId + '/messages' + msgQs, { credentials: 'include' })
        .then(function (r) { return r.json().then(function (b) { return { ok: r.ok, body: b }; }); })
        .then(function (res) {
          if (!res.ok) {
            listEl.innerHTML = '<div class="msg-empty">' + esc(res.body.error || 'Could not load messages') + '</div>';
            return;
          }
          messages = res.body.messages || [];
          renderMessages(messages, listEl);
        })
        .catch(function () {
          listEl.innerHTML = '<div class="msg-empty">Could not load messages.</div>';
        });
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var body = input.value.trim();
      if (!body) return;
      var btn = form.querySelector('.msg-send');
      btn.disabled = true;
      var payload = { body: body };
      if (communityCreator) payload.community_creator = communityCreator;
      fetch('/api/groups/' + groupId + '/messages', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(function (r) { return r.json().then(function (b) { return { ok: r.ok, body: b }; }); })
        .then(function (res) {
          btn.disabled = false;
          if (!res.ok) {
            showErr(res.body.error || 'Could not send message');
            return;
          }
          input.value = '';
          if (res.body.message) {
            messages.push(res.body.message);
            renderMessages(messages, listEl);
          } else {
            loadMsgs();
          }
        })
        .catch(function () {
          btn.disabled = false;
          showErr('Could not send message');
        });
    });

    loadMsgs();
  }
})();
</script>
</body>
</html>
