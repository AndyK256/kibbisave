<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — KibbiSave</title>
  <meta name="description" content="Create your KibbiSave account — group savings for Uganda. Start saving with your community today.">
  <meta name="theme-color" content="#00008b">
  <link rel="icon" href="/assets/kibbisave.jpg" type="image/jpeg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="KibbiSave">
  <meta property="og:title" content="Sign up — KibbiSave">
  <meta property="og:description" content="Create your account and start group savings in Uganda with KibbiSave.">
  <meta property="og:url" content="https://kibbisave.com/signup">
  <meta property="og:image" content="https://kibbisave.com/assets/kibbisave-og.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sign up — KibbiSave">
  <meta name="twitter:description" content="Create your account and start group savings in Uganda with KibbiSave.">
  <meta name="twitter:image" content="https://kibbisave.com/assets/kibbisave-og.jpg">
  <link rel="stylesheet" href="css/kibbisave-site.css">
  <link rel="stylesheet" href="css/kibbisave-auth.css">
</head>
<body class="auth-page">

<a href="kibbisave_home_final.html" class="auth-corner-logo"><img src="/assets/kibbisave-icon.jpg" alt="">kibbi<span>save</span></a>

<main class="auth-main">
  <div>
    <div class="auth-glass">
      <h2>Create account</h2>
      <p class="auth-sub">Join KibbiSave and start saving with your group</p>

      <div id="auth-error" class="auth-error" role="alert"></div>

      <form class="auth-form" action="#" method="post" onsubmit="return false;">
        <div class="auth-field">
          <input type="text" id="name" name="name" placeholder=" " autocomplete="name" required>
          <label for="name">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Full name
          </label>
        </div>

        <div class="auth-field">
          <input type="email" id="email" name="email" placeholder=" " autocomplete="email" required>
          <label for="email">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Email address
          </label>
        </div>

        <div class="auth-field">
          <input type="password" id="password" name="password" placeholder=" " autocomplete="new-password" required>
          <label for="password">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Password
          </label>
        </div>

        <button type="submit" class="auth-btn auth-btn--primary">
          Create account
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

        <div class="auth-divider"><span>OR CONTINUE WITH</span></div>

        <a class="auth-btn auth-btn--google" href="/api/auth/google">
          <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039L38.802 8.841C34.553 4.806 29.613 2.5 24 2.5C11.983 2.5 2.5 11.983 2.5 24s9.483 21.5 21.5 21.5S45.5 36.017 45.5 24c0-1.538-.135-3.022-.389-4.417z"/>
            <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12.5 24 12.5c3.059 0 5.842 1.154 7.961 3.039l5.839-5.841C34.553 4.806 29.613 2.5 24 2.5C16.318 2.5 9.642 6.723 6.306 14.691z"/>
            <path fill="#4CAF50" d="M24 45.5c5.613 0 10.553-2.306 14.802-6.341l-5.839-5.841C30.842 35.846 27.059 38 24 38c-5.039 0-9.345-2.608-11.124-6.481l-6.571 4.819C9.642 41.277 16.318 45.5 24 45.5z"/>
            <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l5.839 5.841C44.196 35.123 45.5 29.837 45.5 24c0-1.538-.135-3.022-.389-4.417z"/>
          </svg>
          Sign up with Google
        </a>

        <p class="auth-note">First-time Google users get an account automatically. We&rsquo;ll send a welcome email when you join.</p>
      </form>

      <p class="auth-foot">
        Already have an account? <a href="/login">Sign in</a>
      </p>

      <a class="auth-skip" href="kibbisave_home_final.html">Continue without signing in</a>
    </div>
  </div>
</main>

<script src="js/kibbisave-auth.js"></script>
</body>
</html>
